<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Tienda de Vaporizadores 💨</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0ea5e9;
      --primary-hover: #0284c7;
      --secondary: #64748b;
      --background: #f0f9ff;
      --card-bg: #ffffff;
      --text: #0f172a;
      --border: #bae6fd;
    }
    body { font-family: 'Outfit', sans-serif; background: var(--background); color: var(--text); padding: 20px; }
    header { background: linear-gradient(135deg, #0369a1 0%, #0ea5e9 100%); color: white; padding: 40px; text-align: center; border-radius: 12px; }
    main { max-width: 900px; margin: 20px auto; }
    section { background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }
    .form-group { margin-bottom: 15px; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; }
    button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; background: var(--primary); color: white; }
    button.secondary { background: var(--secondary); }
  </style>
</head>
<body>
  <header>
    <h1>Tienda de Vaporizadores</h1>
    <p>Gestión de Inventario</p>
  </header>
  <main>
    <section>
      <h2>Catálogo</h2>
      <button id="btnCargar">Sincronizar Catálogo</button>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tbodyProductos"></tbody>
      </table>
    </section>
    <section>
      <h2 id="formTitle">Agregar Producto</h2>
      <div class="form-group">
        <label>Nombre del Vaporizador</label>
        <input type="text" id="nombre" placeholder="Ej: Vaporizador Pro">
      </div>
      <div class="form-group">
        <label>Descripción</label>
        <textarea id="descripcion" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label>Precio</label>
        <input type="number" id="precio">
      </div>
      <div class="form-group">
        <label>Stock</label>
        <input type="number" id="stock">
      </div>
      <button id="btnGuardar">Guardar Producto</button>
      <button id="btnCancelar" class="secondary">Cancelar</button>
      <div id="status"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
