<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Tienda de Alimentos para Perritos 🐶</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Importar tipografía moderna de Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --secondary: #64748b;
      --secondary-hover: #475569;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #10b981;
      --background: #f8fafc;
      --card-bg: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05), 0 0 0 1px rgb(0 0 0 / 0.02);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.06), 0 4px 6px -4px rgb(0 0 0 / 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--background);
      color: var(--text);
      line-height: 1.5;
      padding-bottom: 60px;
    }

    header {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white;
      padding: 40px 20px;
      text-align: center;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -20%;
      width: 60%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 80%);
      transform: rotate(30deg);
      pointer-events: none;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    header p {
      font-weight: 300;
      font-size: 1.1rem;
      opacity: 0.9;
      max-width: 600px;
      margin: 0 auto;
    }

    main {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    @media (min-width: 900px) {
      main {
        grid-template-columns: 1.6fr 1fr;
        align-items: start;
      }
    }

    section {
      background: var(--card-bg);
      padding: 24px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    section:hover {
      box-shadow: var(--shadow-lg);
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 20px;
      position: relative;
      padding-bottom: 8px;
      letter-spacing: -0.3px;
    }

    h2::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 40px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
    }

    .actions {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    }

    button:active {
      transform: scale(0.97);
    }

    button#btnCargar {
      background: var(--primary);
      color: white;
    }

    button#btnCargar:hover {
      background: var(--primary-hover);
    }

    button#btnGuardar {
      background: var(--success);
      color: white;
      flex: 1;
    }

    button#btnGuardar:hover {
      background: #059669;
    }

    button.secondary {
      background: var(--secondary);
      color: white;
    }

    button.secondary:hover {
      background: var(--secondary-hover);
    }

    button.danger {
      background: var(--danger);
      color: white;
      padding: 6px 12px;
      font-size: 0.85rem;
    }

    button.danger:hover {
      background: var(--danger-hover);
    }

    .btn-editar {
      background: #eff6ff;
      color: #2563eb;
      padding: 6px 12px;
      font-size: 0.85rem;
      border: 1px solid #dbeafe;
    }

    .btn-editar:hover {
      background: #dbeafe;
    }

    .table-container {
      overflow-x: auto;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th, td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.95rem;
    }

    th {
      background: #f1f5f9;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.5px;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: #f8fafc;
    }

    .form-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    input, textarea {
      font-family: inherit;
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fdfdfd;
    }

    input:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
      background: white;
    }

    textarea {
      resize: vertical;
    }

    .row-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .status {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .status.show {
      display: flex;
    }

    .status.ok {
      background: #ecfdf5;
      color: #047857;
      border: 1px solid #a7f3d0;
    }

    .status.error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .badge-stock {
      display: inline-flex;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .badge-stock.low {
      background: #fef3c7;
      color: #d97706;
    }

    .badge-stock.normal {
      background: #d1fae5;
      color: #065f46;
    }
  </style>
</head>
<body>
  <header>
    <h1>🐶 Tienda de Alimentos para Perritos</h1>
    <p>Portal interactivo de gestión de inventario y catálogo de productos</p>
  </header>
  <main>
    <section>
      <h2>Catálogo de Productos</h2>
      <div class="actions">
        <button id="btnCargar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
          Sincronizar Catálogo
        </button>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre del Producto</th>
              <th>Descripción</th>
              <th style="text-align: right;">Precio</th>
              <th style="text-align: center;">Stock</th>
              <th style="text-align: center;">Acciones</th>
            </tr>
          </thead>
          <tbody id="tbodyProductos">
            <!-- Cargando dinámicamente -->
          </tbody>
        </table>
      </div>
    </section>

    <section>
      <h2 id="formTitle">Agregar Nuevo Producto</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="nombre">Nombre de Alimento</label>
          <input type="text" id="nombre" placeholder="Ej: Alimento Premium Cachorro Sabor Pollo" />
        </div>
        <div class="form-group">
          <label for="descripcion">Detalles y Especificaciones</label>
          <textarea id="descripcion" rows="3" placeholder="Sabor a pollo, razas pequeñas, bolsa de 15kg..."></textarea>
        </div>
        <div class="row-inputs">
          <div class="form-group">
            <label for="precio">Precio ($)</label>
            <input type="number" id="precio" step="1" min="0" placeholder="Ej: 19990" />
          </div>
          <div class="form-group">
            <label for="stock">Cantidad en Stock</label>
            <input type="number" id="stock" min="0" placeholder="Ej: 15" />
          </div>
        </div>
      </div>
      <div class="actions" style="margin-top: 24px; margin-bottom: 0;">
        <button id="btnGuardar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Guardar Producto
        </button>
        <button id="btnCancelar" class="secondary">Cancelar</button>
      </div>
      <div id="status" class="status"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
