      <h2 id="formTitle">Agregar Nuevo Producto</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="nombre">Nombre de Alimento</label>
          <input type="text" id="nombre" placeholder="Ej: Alimento Premium Cachorro Sabor Pollo" />
        </div>
        <div class="form-group">
          <label for="descripcion">Detalles y Especificaciones</label>
          <textarea id="descripcion" rows="3" placeholder="Sabor a pollo, razas pequeñas, bolsa de 15kg..."></textarea>
        </div>
        <div class="row-inputs">
          <div class="form-group">
            <label for="precio">Precio ($)</label>
            <input type="number" id="precio" step="1" min="0" placeholder="Ej: 19990" />
          </div>
          <div class="form-group">
            <label for="stock">Cantidad en Stock</label>
            <input type="number" id="stock" min="0" placeholder="Ej: 15" />

        <button id="btnCancelar" class="secondary">Cancelar</button>
